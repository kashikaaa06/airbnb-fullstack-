<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Airbnb Clone</title>
    <style>
        body {
            font-family: system-ui, -apple-system, sans-serif;
            margin: 0;
            padding: 20px;
            background: linear-gradient(135deg, #ff5a5f 0%, #ff385c 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        .container {
            background: white;
            border-radius: 24px;
            padding: 40px;
            text-align: center;
            max-width: 600px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.1);
        }
        h1 {
            color: #ff385c;
            font-size: 48px;
            margin-bottom: 16px;
        }
        p {
            color: #666;
            font-size: 18px;
            line-height: 1.5;
        }
        .status {
            background: #f7f7f7;
            border-radius: 12px;
            padding: 16px;
            margin: 24px 0;
            color: #ff385c;
            font-weight: bold;
        }
        .emoji {
            font-size: 64px;
            margin: 20px 0;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="emoji">🏠✨</div>
        <h1>Travelxgo</h1>
        <p>Your full-stack Airbnb project is coming to life!</p>
        <div class="status">
            🚧 Under Construction 🚧
        </div>
        <p>This site auto-deploys every time you push code.<br>
        Stay tuned for the complete experience!</p>
        <small>Last updated: <span id="date"></span></small>
    </div>
    <script>
        document.getElementById('date').innerText = new Date().toLocaleString();
    </script>
</body>
</html>
